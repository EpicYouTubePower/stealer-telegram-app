<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- КРИТИЧЕСКИ ВАЖНО: Подключение скрипта -->
    <script src="https://telegram.org"></script>
    <style>
        body { background: #000; color: #f00; text-align: center; font-family: sans-serif; padding-top: 50px; }
        input { width: 80%; padding: 15px; background: #111; color: #fff; border: 1px solid #f00; border-radius: 10px; margin-bottom: 20px; }
        button { width: 85%; padding: 15px; background: #f00; color: #fff; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>ВВОД ДАННЫХ</h2>
    <input type="text" id="phone" placeholder="+79991234567">
    <button onclick="send()">ОТПРАВИТЬ</button>

    <script>
        // Инициализация
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function send() {
            let val = document.getElementById('phone').value;
            if (val) {
                tg.sendData(val);
                tg.close();
            }
        }
    </script>
</body>
</html>
